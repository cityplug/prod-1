---
version: '3.4'
services:
  pihole:
    container_name: pihole
    hostname: pihole.copilot
    image: pihole/pihole:latest
    environment:
      WEBTHEME: default-dark
      TZ: Europe/London
      WEBPASSWORD: Szxs234.
    volumes:
      - /opt/appdata/pihole:/etc/pihole/
      - /opt/appdata/pihole/dnsmasq:/etc/dnsmasq.d/
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 80:80/tcp
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  speedtest-tracker:
    container_name: speedtest-tracker
    image: lscr.io/linuxserver/speedtest-tracker:latest
    environment:
      - PUID=1000
      - PGID=1000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=speedtest_tracker
      - DB_USERNAME=focal
      - DB_PASSWORD=T0day.T1jan333
    volumes:
      - /opt/speedhole-prod-1/appdata/speedtest:/config
      - /opt/speedhole-prod-1/appdata/speedtest/ssl:/config/keys
    ports:
      - 8080:80
      - 8443:443
    restart: unless-stopped
    depends_on:
      - db
  db:
    container_name: speedtest-db
    image: mariadb:10
    restart: always
    environment:
      - MARIADB_DATABASE=speedtest_tracker
      - MARIADB_USER=focal
      - MARIADB_PASSWORD=T0day.T1jan333
      - MARIADB_RANDOM_ROOT_PASSWORD=true
    volumes:
      - /opt/speedhole-prod-1/appdata/speedtest/db:/var/lib/mysql